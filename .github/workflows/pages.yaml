name: Deploy GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject build metadata
        shell: bash
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          BUILD_DATE="$(date +"%d/%m/%Y %H:%M")"
          META="Build ${BUILD_DATE} • ${SHORT_SHA}"
          # Utilise un séparateur '|' + échappe les caractères spéciaux pour sed
          ESCAPED_META=$(printf '%s\n' "$META" | sed -e 's/[\/&]/\\&/g')
          sed -i "s|__VERSION__|$ESCAPED_META|g" index.html
          echo "Injected: $META"
          grep -n "__VERSION__" index.html && (echo "Placeholder still present!" && exit 1) || true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
